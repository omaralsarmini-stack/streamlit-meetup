[client]
toolbarMode = "minimal"
showErrorDetails = false

[theme]
base = "light"
primaryColor = "#667eea"
backgroundColor = "#f5f7fa"
secondaryBackgroundColor = "#eef2f7"
textColor = "#111827"
font = "sans serif"

[server]
headless = true
port = 8503
maxUploadSize = 200
enableCORS = true

[logger]
level = "error"
